const PROMPTS = {
  overview:(n,c)=>`You are a senior brand strategist. Brand: "${n}". Context: ${c}\n\nWrite a compelling brand overview. Be specific and distinct.\n\nReturn ONLY this JSON:\n${SHAPES.overview}`,
  mission:(n,c)=>`You are a senior brand strategist. Brand: "${n}". Context: ${c}\n\nWrite mission, vision and 3 tagline options. Be specific, not generic.\n\nReturn ONLY this JSON:\n${SHAPES.mission}`,
  values:(n,c)=>`You are a senior brand strategist. Brand: "${n}". Context: ${c}\n\nWrite 6 DISTINCTIVE brand values. Avoid generic ones like "integrity". Make them specific to this brand.\n\nReturn ONLY this JSON:\n${SHAPES.values}`,
  positioning:(n,c)=>`You are a senior brand strategist. Brand: "${n}". Context: ${c}\n\nWrite the brand positioning including differentiation and value proposition. Include the perception shift (from→to).\n\nReturn ONLY this JSON:\n${SHAPES.positioning}`,
  competitors:(n,c)=>`You are a senior brand strategist. Brand: "${n}". Context: ${c}\n\nIdentify 3 global AND 2 local/regional competitors who offer THE EXACT SAME type of service. Do NOT list unrelated businesses.\n\nReturn ONLY this JSON:\n${SHAPES.competitors}`,
  market:(n,c)=>`You are a senior brand strategist. Brand: "${n}". Context: ${c}\n\nIdentify real market gaps, specific opportunities, and this brand's unique advantage.\n\nReturn ONLY this JSON:\n${SHAPES.market}`,
  icp:(n,c)=>`You are a senior brand strategist. Brand: "${n}". Context: ${c}\n\nDescribe the ideal customer profile with specific demographics. Be precise.\n\nReturn ONLY this JSON:\n${SHAPES.icp}`,
  psychographics:(n,c)=>`You are a senior brand strategist. Brand: "${n}". Context: ${c}\n\nDescribe the deep psychographic profile of the ideal customer: mindset, values, motivations, behaviors.\n\nReturn ONLY this JSON:\n${SHAPES.psychographics}`,
  painpoints:(n,c)=>`You are a senior brand strategist. Brand: "${n}". Context: ${c}\n\nDescribe what the audience aspires to and what pain points they face. What do they seek and why do they choose this brand?\n\nReturn ONLY this JSON:\n${SHAPES.painpoints}`,
  personality:(n,c)=>`You are a senior brand strategist. Brand: "${n}". Context: ${c}\n\nDefine the brand archetype, personality keywords, what it feels like, and what it is NOT.\n\nReturn ONLY this JSON:\n${SHAPES.personality}`,
  voice:(n,c)=>`You are a senior brand strategist. Brand: "${n}". Context: ${c}\n\nDefine 5 brand voice characteristics and 5 messaging pillars with specific message examples.\n\nReturn ONLY this JSON:\n${SHAPES.voice}`,
  tone:(n,c)=>`You are a senior brand strategist. Brand: "${n}". Context: ${c}\n\nDefine tone of voice for 4 contexts: social media, with clients, marketing campaigns, brand films. Each needs a tone description and real example sentence.\n\nReturn ONLY this JSON:\n${SHAPES.tone}`,
  visual:(n,c)=>`You are a senior brand strategist. Brand: "${n}". Context: ${c}\n\nDefine visual identity direction: logo direction, color palette with meaning, typography style, imagery style.\n\nReturn ONLY this JSON:\n${SHAPES.visual}`,
  experience:(n,c)=>`You are a senior brand strategist. Brand: "${n}". Context: ${c}\n\nDefine how clients experience this brand at each stage: discovery, consultation, production, delivery, after-experience.\n\nReturn ONLY this JSON:\n${SHAPES.experience}`,
  reputation:(n,c)=>`You are a senior brand strategist. Brand: "${n}". Context: ${c}\n\nDefine the brand reputation strategy: current position, goal, perception shift (from→to), and key actions.\n\nReturn ONLY this JSON:\n${SHAPES.reputation}`,
  content:(n,c)=>`You are a senior brand strategist. Brand: "${n}". Context: ${c}\n\nDefine the content strategy: 4 content pillars, platform-specific strategies for Instagram/TikTok/YouTube/LinkedIn, and content formats.\n\nReturn ONLY this JSON:\n${SHAPES.content}`,
  storytelling:(n,c)=>`You are a senior brand strategist. Brand: "${n}". Context: ${c}\n\nDefine 5 storytelling pillars, the cultural differentiation approach, and specific content formats.\n\nReturn ONLY this JSON:\n${SHAPES.storytelling}`,
  community:(n,c)=>`You are a senior brand strategist. Brand: "${n}". Context: ${c}\n\nDefine the community building vision, approach, specific initiatives, and which channels to use.\n\nReturn ONLY this JSON:\n${SHAPES.community}`,
  roadmap:(n,c)=>`You are a senior brand strategist. Brand: "${n}". Context: ${c}\n\nDefine the growth roadmap: actions to elevate brand, expand influence, achieve global presence, and core playbook principles.\n\nReturn ONLY this JSON:\n${SHAPES.roadmap}`,
};

async function callAPI(sectionId, name, ctx) {
  const prompt = PROMPTS[sectionId](name, ctx);
  const res = await fetch("/api/chat", {
    method:"POST", headers:{"Content-Type":"application/json"},
    body: JSON.stringify({model:"claude-opus-4-5", max_tokens:1500, messages:[{role:"user",content:prompt}]}),
  });
  const data = await res.json();
  if (!res.ok || data.error) throw new Error(data.error?.message || `Error ${res.status}`);
  const raw = (data.content||[]).map(b=>b.type==="text"?b.text:"").filter(Boolean).join("\n").trim();
  if (!raw) throw new Error("Empty response");
  try{return JSON.parse(raw)}catch(_){}
  const s=raw.replace(/^```(?:json)?\s*/i,"").replace(/\s*```\s*$/i,"").trim();
  try{return JSON.parse(s)}catch(_){}
  const m=raw.match(/\{[\s\S]*\}/);
  if(m){try{return JSON.parse(m[0])}catch(_){}}
  throw new Error("Parse failed: "+raw.slice(0,100));
}

async function callTool(prompt, maxTokens=1500) {
  const res = await fetch("/api/chat", {
    method:"POST", headers:{"Content-Type":"application/json"},
    body: JSON.stringify({model:"claude-opus-4-5", max_tokens:maxTokens, messages:[{role:"user",content:prompt}]}),
  });
  const data = await res.json();
  if (!res.ok || data.error) throw new Error(data.error?.message || `Error ${res.status}`);
  const raw = (data.content||[]).map(b=>b.type==="text"?b.text:"").filter(Boolean).join("\n").trim();
  if (!raw) throw new Error("Empty response");
  try{return JSON.parse(raw)}catch(_){}
  const s=raw.replace(/^```(?:json)?\s*/i,"").replace(/\s*```\s*$/i,"").trim();
  try{return JSON.parse(s)}catch(_){}
  const m=raw.match(/\{[\s\S]*\}/);
  if(m){try{return JSON.parse(m[0])}catch(_){}}
  throw new Error("Parse failed");
}

const Renderers = {

function BrandDNATool({name, ctx}) {
  const [data, setData] = useState(null);
  const [loading, setLoading] = useState(false);
  const [err, setErr] = useState("");
  const generate = async () => {
    if (!name || !ctx) { setErr("Set brand name and context first"); return; }
    setErr(""); setLoading(true);
    try {
      const shape = `{"dna_statement":"","essence":"","personality_word":"","emotional_promise":"","cultural_truth":"","north_star":"","in_one_breath":""}`;
      const prompt = `You are a brand strategist. Brand: "${name}". Context: ${ctx}\n\nDistil this brand down to its absolute DNA — the irreducible essence. Be specific and powerful, not generic.\n\nReturn ONLY this JSON:\n${shape}`;
      const r = await callTool(prompt);
      setData(r);
    } catch(e) { setErr(e.message); }
    setLoading(false);
  };
  return (
    <div style={{padding:"28px 32px",height:"calc(100vh - 65px)",overflow:"auto"}}>
      <div style={{maxWidth:900,margin:"0 auto"}}>
        <div style={{marginBottom:32}}>
          <h2 style={{fontFamily:"'DM Serif Display',serif",fontSize:36,color:C.cream,marginTop:12,marginBottom:8}}>Brand DNA Generator</h2>
          <P color={C.muted}>Distil any brand down to its irreducible essence — the single truth that everything else is built on.</P>
        </div>
        <div style={{marginBottom:20,display:"flex",gap:10,alignItems:"center",flexWrap:"wrap"}}>
          <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:11,color:C.sandD,padding:"8px 16px",background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.08)"}}>
            Brand: <span style={{color:C.sand}}>{name||"—"}</span>
          </div>
          <BtnPrimary onClick={generate} disabled={loading}>{loading?"GENERATING DNA…":"✦ GENERATE BRAND DNA"}</BtnPrimary>
        </div>
        <Err msg={err}/>
        {loading && <Spinner label="Brand DNA"/>}
        {!loading && !data && <Empty msg="Click Generate Brand DNA above"/>}
        {!loading && data && (
          <div style={{display:"flex",flexDirection:"column",gap:3,animation:"fadeUp 0.4s ease"}}>
            <div style={{background:"linear-gradient(135deg,#4A1942,#7B5C42)",padding:"40px 36px",textAlign:"center"}}>
              <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:9,color:"rgba(255,255,255,0.4)",letterSpacing:"0.3em",marginBottom:16}}>BRAND DNA STATEMENT</div>
              <p style={{fontFamily:"'DM Serif Display',serif",fontSize:24,fontStyle:"italic",color:C.cream,lineHeight:1.65,maxWidth:680,margin:"0 auto"}}>{data.dna_statement}</p>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:3}}>
              {[["ESSENCE",data.essence,C.black],["ONE WORD",data.personality_word,C.green],["EMOTIONAL PROMISE",data.emotional_promise,C.black],["CULTURAL TRUTH",data.cultural_truth,C.brown],["NORTH STAR",data.north_star,C.black],["IN ONE BREATH",data.in_one_breath,C.green]].map(([l,v,bg])=>(
                <div key={l} style={{background:bg,padding:22}}><FL>{l}</FL><P color={l==="ONE WORD"?C.cream:C.sandL} size={l==="ONE WORD"?22:13} style={l==="ONE WORD"?{fontFamily:"'DM Serif Display',serif",fontStyle:"italic"}:{}}>{v}</P></div>
              ))}
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

        {!loading && data && (
          <div style={{display:"flex",flexDirection:"column",gap:16,animation:"fadeUp 0.4s ease"}}>

                  <div style={{display:"flex",gap:8}}>

                  <div style={{padding:20,borderRight:"1px solid rgba(255,255,255,0.06)"}}>

                    <FL>HOOK</FL>
                    <P size={13} color={C.sand}>{c.hook}</P>

                    <FL>CTA</FL>
                    <div style={{display:"inline-block",background:C.brown,padding:"6px 14px",fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,fontSize:11,color:C.cream,letterSpacing:"0.1em",marginBottom:16}}>{c.cta}</div>
                    <FL>VISUAL DIRECTION</FL>
                    <P size={12.5} color={C.sandD} style={{fontStyle:"italic"}}>{c.visual_direction}</P>
                  </div>
                </div>
                <div style={{padding:"12px 20px",background:"rgba(255,255,255,0.02)",borderTop:"1px solid rgba(255,255,255,0.05)"}}>
                  <span style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:9,color:C.brown,letterSpacing:"0.15em"}}>KPI  </span>
                  <span style={{fontFamily:"Georgia,serif",fontSize:12,color:C.sandD}}>{c.kpi}</span>
                </div>
              </div>
            ))}
          </div>
        )}
      </div>
    </div>
  );
}

function ContentStudioTool({name, ctx}) {
  const [data, setData] = useState(null);
  const [loading, setLoading] = useState(false);
  const [err, setErr] = useState("");
  const [topic, setTopic] = useState("");
  const [platform, setPlatform] = useState("all");
  const generate = async () => {
    if (!name || !ctx) { setErr("Set brand name and context first"); return; }
    setErr(""); setLoading(true);
    try {
      const shape = `{"instagram_caption":"","instagram_hook":"","instagram_hashtags":["","","","",""],"tiktok_script":"","tiktok_hook":"","linkedin_post":"","twitter":"","youtube_title":"","youtube_description":"","content_idea_1":"","content_idea_2":"","content_idea_3":""}`;
      const topicPart = topic ? ` Content topic/theme: "${topic}".` : "";
      const platformPart = platform !== "all" ? ` Focus primarily on ${platform}.` : "";
      const prompt = `You are a social media strategist and copywriter. Brand: "${name}". Context: ${ctx}.${topicPart}${platformPart}\n\nWrite real, platform-optimized content — not placeholder text. Every caption, script, and post must sound authentic to this brand's voice.\n\nReturn ONLY this JSON:\n${shape}`;
      const r = await callTool(prompt, 2000);
      setData(r);
    } catch(e) { setErr(e.message); }
    setLoading(false);
  };
  const platforms = [
    {id:"instagram",label:"Instagram",data:d=>[["CAPTION",d.instagram_caption],["HOOK",d.instagram_hook]],extra:d=>d.instagram_hashtags,bg:"#6B3D5A"},
    {id:"tiktok",label:"TikTok",data:d=>[["HOOK",d.tiktok_hook],["SCRIPT",d.tiktok_script]],bg:"#3D5A6B"},
    {id:"linkedin",label:"LinkedIn",data:d=>[["POST",d.linkedin_post]],bg:"#3D4A6B"},
    {id:"twitter",label:"Twitter/X",data:d=>[["TWEET",d.twitter]],bg:C.black},
    {id:"youtube",label:"YouTube",data:d=>[["TITLE",d.youtube_title],["DESCRIPTION",d.youtube_description]],bg:"#6B3D3D"},
  ];
  return (
    <div style={{padding:"28px 32px",height:"calc(100vh - 65px)",overflow:"auto"}}>
      <div style={{maxWidth:980,margin:"0 auto"}}>
        <div style={{marginBottom:32}}>
          <h2 style={{fontFamily:"'DM Serif Display',serif",fontSize:36,color:C.cream,marginTop:12,marginBottom:8}}>Content Studio</h2>
          <P color={C.muted}>Generate platform-optimized content across Instagram, TikTok, LinkedIn, Twitter and YouTube in one go.</P>
        </div>
        <div style={{marginBottom:20,display:"flex",gap:10,flexWrap:"wrap",alignItems:"center"}}>
          <input value={topic} onChange={e=>setTopic(e.target.value)} placeholder="Content topic or theme (e.g. New collection launch, Behind the scenes…)" style={{...inp(),width:380}}/>
          <select value={platform} onChange={e=>setPlatform(e.target.value)} style={{...inp(),width:160,cursor:"pointer"}}>
            <option value="all">All Platforms</option>
            <option value="Instagram">Instagram</option>
            <option value="TikTok">TikTok</option>
            <option value="LinkedIn">LinkedIn</option>
            <option value="YouTube">YouTube</option>
          </select>
          <BtnPrimary onClick={generate} disabled={loading}>{loading?"GENERATING…":"✦ GENERATE CONTENT"}</BtnPrimary>
        </div>
        <Err msg={err}/>
        {loading && <Spinner label="Content"/>}
        {!loading && !data && <Empty msg="Generate platform-specific content for this brand"/>}
        {!loading && data && (
          <div style={{display:"flex",flexDirection:"column",gap:3,animation:"fadeUp 0.4s ease"}}>
            {platforms.map(p=>(
              <div key={p.id} style={{background:"rgba(255,255,255,0.02)",border:"1px solid rgba(255,255,255,0.06)"}}>
                <div style={{padding:"12px 20px",background:p.bg}}>
                  <span style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,fontSize:11,color:C.cream,letterSpacing:"0.2em"}}>{p.label.toUpperCase()}</span>
                </div>
                <div style={{display:"grid",gridTemplateColumns:`repeat(${p.data(data).length},1fr)`,gap:0}}>
                  {p.data(data).map(([l,v],i)=>(
                    <div key={l} style={{padding:20,borderRight:i<p.data(data).length-1?"1px solid rgba(255,255,255,0.06)":"none"}}>
                      <FL>{l}</FL>
                      <P size={13} color={C.sandL}>{v}</P>
                    </div>
                  ))}
                </div>
                {p.extra && <div style={{padding:"10px 20px",borderTop:"1px solid rgba(255,255,255,0.06)",display:"flex",flexWrap:"wrap",gap:6}}>
                  {(p.extra(data)||[]).map((h,i)=><span key={i} style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:11,color:C.sandD}}>#{h}</span>)}
                </div>}
              </div>
            ))}
            <div style={{background:C.brown,padding:20}}>
              <FL>CONTENT IDEAS</FL>
              <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10}}>
                {[data.content_idea_1,data.content_idea_2,data.content_idea_3].map((idea,i)=>(
                  <div key={i} style={{background:"rgba(0,0,0,0.2)",padding:14}}>
                    <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:9,color:"rgba(255,255,255,0.4)",letterSpacing:"0.2em",marginBottom:6}}>IDEA 0{i+1}</div>
                    <P size={12.5} color={C.sandL}>{idea}</P>
                  </div>
                ))}
              </div>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

function LeadQualifierTool() {
  const [form, setForm] = useState({brand:"",industry:"",goal:"",budget:"",timeline:"",brief:"",challenge:"",source:""});
  const [result, setResult] = useState(null);
  const [loading, setLoading] = useState(false);
  const [err, setErr] = useState("");
  const upd = (k,v) => setForm(p=>({...p,[k]:v}));
  const qualify = async () => {
    if (!form.brand || !form.brief) { setErr("Brand name and brief are required."); return; }
    setErr(""); setLoading(true);
    try {
      const shape = `{"fit_score":0,"intent_score":0,"mql_status":"","fit_analysis":"","intent_analysis":"","strengths":["","",""],"concerns":["",""],"recommended_action":"","pitch_angle":"","urgency":"Low|Medium|High"}`;
      const prompt = `You are a brand strategist evaluating a potential client lead for a creative brand agency.\n\nLead Info:\n- Brand/Company: ${form.brand}\n- Industry: ${form.industry}\n- Goal: ${form.goal}\n- Budget: ${form.budget}\n- Timeline: ${form.timeline}\n- Brand Brief: ${form.brief}\n- Main Challenge: ${form.challenge}\n- How they found us: ${form.source}\n\nScore fit (1-10: do they match the ideal client profile?) and intent (1-10: are they ready to buy?). MQL status: "Qualified" (fit≥7 AND intent≥7), "Needs Nurturing" (fit≥5 OR intent≥5), "Not a Fit" (both <5).\n\nReturn ONLY this JSON:\n${shape}`;
      const r = await callTool(prompt);
      setResult(r);
    } catch(e) { setErr(e.message); }
    setLoading(false);
  };
  const statusColors = {"Qualified":"#3D7A4A","Needs Nurturing":"#7A6A3D","Not a Fit":"#7A3D3D"};
  const ScoreBar = ({label,score,color}) => (
    <div style={{marginBottom:16}}>
      <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
        <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:9,color:C.sandD,letterSpacing:"0.2em"}}>{label}</div>
        <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,fontSize:14,color}}>{score}/10</div>
      </div>
      <div style={{height:4,background:"rgba(255,255,255,0.08)",borderRadius:2}}>
        <div style={{height:"100%",width:`${(score/10)*100}%`,background:color,borderRadius:2,transition:"width 1s"}}/>
      </div>
    </div>
  );
  const Field = ({label,children}) => <div style={{marginBottom:14}}><div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:9,fontWeight:700,color:C.sandD,letterSpacing:"0.2em",marginBottom:6}}>{label}</div>{children}</div>;
  return (
    <div style={{padding:"28px 32px",height:"calc(100vh - 65px)",overflow:"auto"}}>
      <div style={{maxWidth:980,margin:"0 auto"}}>
        <div style={{marginBottom:32}}>
          <h2 style={{fontFamily:"'DM Serif Display',serif",fontSize:36,color:C.cream,marginTop:12,marginBottom:8}}>Lead Qualifier</h2>
          <P color={C.muted}>Score incoming leads on fit and intent to identify Marketing Qualified Leads (MQLs) ready to convert.</P>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16,marginBottom:20}}>
          <Field label="BRAND / COMPANY NAME *"><input value={form.brand} onChange={e=>upd("brand",e.target.value)} placeholder="e.g. Lumina Studio" style={inp()}/></Field>
          <Field label="INDUSTRY"><input value={form.industry} onChange={e=>upd("industry",e.target.value)} placeholder="e.g. Photography, Fashion, Tech" style={inp()}/></Field>
          <Field label="MAIN GOAL">
            <select value={form.goal} onChange={e=>upd("goal",e.target.value)} style={{...inp(),cursor:"pointer"}}>
              <option value="">Select goal…</option>
              <option>Launch a new brand</option>
              <option>Rebrand / refresh existing brand</option>
              <option>Improve brand strategy</option>
              <option>Create content / campaigns</option>
              <option>Just exploring</option>
            </select>
          </Field>
          <Field label="BUDGET RANGE">
            <select value={form.budget} onChange={e=>upd("budget",e.target.value)} style={{...inp(),cursor:"pointer"}}>
              <option value="">Select budget…</option>
              <option>Under $500</option>
              <option>$500 – $2,000</option>
              <option>$2,000 – $5,000</option>
              <option>$5,000 – $10,000</option>
              <option>$10,000+</option>
            </select>
          </Field>
          <Field label="TIMELINE">
            <select value={form.timeline} onChange={e=>upd("timeline",e.target.value)} style={{...inp(),cursor:"pointer"}}>
              <option value="">Select timeline…</option>
              <option>ASAP (under 1 month)</option>
              <option>1 – 3 months</option>
              <option>3 – 6 months</option>
              <option>6 months+</option>
              <option>Just exploring</option>
            </select>
          </Field>
          <Field label="HOW THEY FOUND YOU">
            <select value={form.source} onChange={e=>upd("source",e.target.value)} style={{...inp(),cursor:"pointer"}}>
              <option value="">Select source…</option>
              <option>Instagram</option>
              <option>TikTok</option>
              <option>LinkedIn</option>
              <option>Referral</option>
              <option>Google</option>
              <option>Other</option>
            </select>
          </Field>
        </div>
        <Field label="BRAND BRIEF *"><textarea value={form.brief} onChange={e=>upd("brief",e.target.value)} rows={4} placeholder="Describe their brand, what they do, who they serve…" style={inp()}/></Field>
        <Field label="MAIN CHALLENGE"><textarea value={form.challenge} onChange={e=>upd("challenge",e.target.value)} rows={3} placeholder="What's their biggest brand or marketing challenge right now?" style={inp()}/></Field>
        <div style={{marginBottom:24}}><Err msg={err}/><BtnPrimary onClick={qualify} disabled={loading}>{loading?"QUALIFYING LEAD…":"✦ QUALIFY THIS LEAD"}</BtnPrimary></div>
        {loading && <Spinner label="Lead Score"/>}
        {!loading && result && (
          <div style={{animation:"fadeUp 0.4s ease"}}>
            <div style={{background:statusColors[result.mql_status]||C.brown,padding:"24px 28px",marginBottom:3,display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:12}}>
              <div>
                <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:9,color:"rgba(255,255,255,0.5)",letterSpacing:"0.25em",marginBottom:6}}>MQL STATUS</div>
                <div style={{fontFamily:"'DM Serif Display',serif",fontSize:28,color:C.cream}}>{result.mql_status}</div>
              </div>
              <div style={{textAlign:"right"}}>
                <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:9,color:"rgba(255,255,255,0.5)",letterSpacing:"0.2em",marginBottom:4}}>URGENCY</div>
                <Pill bg="rgba(0,0,0,0.3)" fg={C.cream}>{result.urgency}</Pill>
              </div>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:3,marginBottom:3}}>
              <div style={{background:C.black,padding:24}}>
                <ScoreBar label="FIT SCORE — Do they match our ICP?" score={result.fit_score} color="#7dbe7d"/>
                <ScoreBar label="INTENT SCORE — Are they ready to buy?" score={result.intent_score} color={C.sand}/>
              </div>
              <div style={{background:C.green,padding:24}}>
                <FL>FIT ANALYSIS</FL><P size={13} color={C.sandL} style={{marginBottom:12}}>{result.fit_analysis}</P>
                <FL>INTENT ANALYSIS</FL><P size={13} color={C.sandL}>{result.intent_analysis}</P>
              </div>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:3,marginBottom:3}}>
              <div style={{background:C.black,padding:22}}>
                <FL>STRENGTHS</FL>
                {(result.strengths||[]).map((s,i)=><div key={i} style={{display:"flex",gap:8,marginBottom:8}}><span style={{color:"#7dbe7d"}}>✓</span><P size={12.5} color={C.sandL}>{s}</P></div>)}
              </div>
              <div style={{background:"rgba(140,30,30,0.15)",padding:22}}>
                <FL>CONCERNS</FL>
                {(result.concerns||[]).map((c,i)=><div key={i} style={{display:"flex",gap:8,marginBottom:8}}><span style={{color:"#f5a0a0"}}>—</span><P size={12.5} color={C.sandL}>{c}</P></div>)}
              </div>
            </div>
            <div style={{background:C.brown,padding:22,marginBottom:3}}>
              <FL>RECOMMENDED ACTION</FL>
              <P color={C.cream} size={14}>{result.recommended_action}</P>
            </div>
            <div style={{background:"rgba(255,255,255,0.03)",padding:22,borderLeft:`3px solid ${C.brown}`}}>
              <FL>PITCH ANGLE</FL>
              <P color={C.sand} style={{fontStyle:"italic"}} size={14}>{result.pitch_angle}</P>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

function StrategyBuilder({isStudio}) {
  const [section, setSection] = useState("overview");
  const [clientName, setCN] = useState("");
  const [clientCtx, setCC] = useState("");
  const [generated, setGenerated] = useState({});
  const [spinning, setSpinning] = useState(null);
  const [allBusy, setAllBusy] = useState(false);
  const [err, setErr] = useState("");
  const [collapsedGroups, setCollapsed] = useState({});

  const activeName = isStudio ? STUDIO_NAME : clientName;
  const activeCtx  = isStudio ? STUDIO_CTX  : clientCtx;
  const busy = !!spinning || allBusy;
  const activeSec = ALL_SECTIONS.find(s=>s.id===section);
  const activeGroup = GROUPS.find(g=>g.sections.some(s=>s.id===section));
  const progress = Object.keys(generated).length;

  const toggleGroup = (g) => setCollapsed(p=>({...p,[g]:!p[g]}));

  const genOne = async (sid) => {
    if (!activeName.trim() || !activeCtx.trim()) { setErr(isStudio?"Context missing.":"Fill in client name and brief first."); return; }
    setErr(""); setSpinning(sid);
    try { const r = await callAPI(sid, activeName.trim(), activeCtx.trim()); setGenerated(p=>({...p,[sid]:r})); }
    catch(e) { setErr(e.message); }
    setSpinning(null);
  };

  const genAll = async () => {
    if (!activeName.trim() || !activeCtx.trim()) { setErr(isStudio?"Context missing.":"Fill in client name and brief first."); return; }
    setErr(""); setAllBusy(true);
    for (const s of ALL_SECTIONS) {
      setSpinning(s.id);
      try { const r = await callAPI(s.id, activeName.trim(), activeCtx.trim()); setGenerated(p=>({...p,[s.id]:r})); }
      catch(e) { setErr(`Stopped at "${s.label}": ${e.message}`); break; }
    }
    setSpinning(null); setAllBusy(false);
  };

  const inp2 = inp();
  const Renderer = Renderers[section];

  return (
    <div style={{display:"flex",height:"calc(100vh - 65px)"}}>
      {/* SIDEBAR */}
      <aside style={{width:230,flexShrink:0,borderRight:"1px solid rgba(255,255,255,0.07)",display:"flex",flexDirection:"column",overflowY:"auto",background:"rgba(255,255,255,0.01)"}}>
        {GROUPS.map(g=>(
          <div key={g.label}>
            <button onClick={()=>toggleGroup(g.label)} style={{width:"100%",display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 16px 8px",background:"transparent",border:"none",borderBottom:"1px solid rgba(255,255,255,0.04)",cursor:"pointer"}}>
              <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:8,fontWeight:700,color:g.color,letterSpacing:"0.22em"}}>{g.label}</div>
              <span style={{color:C.muted,fontSize:10}}>{collapsedGroups[g.label]?"▸":"▾"}</span>
            </button>
            {!collapsedGroups[g.label] && g.sections.map(s=>{
              const active=section===s.id, done=!!generated[s.id], isSpin=spinning===s.id;
              return (
                <button key={s.id} onClick={()=>setSection(s.id)} style={{display:"flex",alignItems:"center",gap:8,padding:"10px 16px",background:active?"rgba(244,240,232,0.93)":"transparent",color:active?C.black:done?C.sand:C.muted,border:"none",width:"100%",textAlign:"left",borderLeft:active?`3px solid ${g.color}`:"3px solid transparent",transition:"background 0.1s"}}>
                  <span style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,fontSize:10,color:active?g.color:done?C.sandD:C.muted,minWidth:20}}>{s.num}</span>
                  <span style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:11,flex:1,fontWeight:active?700:400,letterSpacing:"0.04em"}}>{s.label}</span>
                  {isSpin&&<span style={{display:"inline-block",animation:"spin 1s linear infinite",opacity:0.5,fontSize:10}}>◌</span>}
                  {done&&!isSpin&&!active&&<span style={{color:g.color,fontSize:10}}>✓</span>}
                </button>
              );
            })}
          </div>
        ))}
        <div style={{padding:"14px 16px 20px",marginTop:"auto",borderTop:"1px solid rgba(255,255,255,0.05)"}}>
          <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:9,fontWeight:700,color:C.muted,letterSpacing:"0.18em",marginBottom:6}}>{progress}/{ALL_SECTIONS.length} COMPLETE</div>
          <div style={{height:2,background:"rgba(255,255,255,0.07)",borderRadius:1}}>
            <div style={{height:"100%",width:`${(progress/ALL_SECTIONS.length)*100}%`,background:activeGroup?.color||C.brown,transition:"width .5s",borderRadius:1}}/>
          </div>
        </div>
      </aside>

      {/* MAIN */}
      <main style={{flex:1,overflow:"auto",display:"flex",flexDirection:"column"}}>
        <div style={{padding:"18px 24px",borderBottom:"1px solid rgba(255,255,255,0.07)",background:"rgba(255,255,255,0.015)",flexShrink:0}}>
          {isStudio && (
            <div style={{marginBottom:14,padding:"12px 16px",background:"rgba(123,92,66,0.12)",borderLeft:`2px solid ${C.brown}`,display:"flex",gap:16,alignItems:"flex-start"}}>
              <div style={{flex:1}}>
                <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:9,fontWeight:700,color:C.brown,letterSpacing:"0.2em",marginBottom:4}}>GENERATING FOR</div>
                <div style={{fontFamily:"'DM Serif Display',serif",fontSize:15,color:C.cream,marginBottom:3}}>The Mused Studio</div>
                <P size={12} color={C.sand}>{STUDIO_CTX}</P>
              </div>
            </div>
          )}
          {!isStudio && (
            <div style={{marginBottom:14}}>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:12}}>
                <div>
                  <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:9,fontWeight:700,color:C.sandD,letterSpacing:"0.2em",marginBottom:6}}>CLIENT NAME *</div>
                  <input value={clientName} onChange={e=>setCN(e.target.value)} placeholder="e.g. Bloom Atelier" style={{...inp2,fontFamily:"'DM Serif Display',serif",fontSize:15}}/>
                </div>
                <div>
                  <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:9,fontWeight:700,color:C.sandD,letterSpacing:"0.2em",marginBottom:6}}>INDUSTRY</div>
                  <input placeholder="e.g. Wellness, Fashion, Tech…" style={inp2}/>
                </div>
              </div>
              <div>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
                  <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:9,fontWeight:700,color:C.sandD,letterSpacing:"0.2em"}}>BRAND BRIEF *</div>
                  <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:9,color:clientCtx.length<60?C.brown:C.muted}}>{clientCtx.length} chars {clientCtx.length<60?"— more detail = better output":"✓"}</div>
                </div>
                <textarea value={clientCtx} onChange={e=>setCC(e.target.value)} rows={4} placeholder="Describe the brand: what they do, who they serve, what makes them different, tone, goals, market…" style={inp2}/>
              </div>
            </div>
          )}
          <Err msg={err}/>
          <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
            <BtnPrimary onClick={()=>genOne(section)} disabled={busy}>{spinning===section?"GENERATING…":`GENERATE ${activeSec?.label.toUpperCase()}`}</BtnPrimary>
            <BtnOutline onClick={genAll} disabled={busy}>{allBusy?`BUILDING… ${progress}/${ALL_SECTIONS.length}`:"✦  GENERATE ALL 19 SECTIONS"}</BtnOutline>
            {progress>0&&!busy&&<button onClick={()=>{setGenerated({});setErr("");}} style={{padding:"11px 14px",background:"transparent",color:C.muted,border:"1px solid rgba(255,255,255,0.07)",fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,fontSize:10,letterSpacing:"0.14em",cursor:"pointer"}}>RESET</button>}
          </div>
        </div>
        <div style={{flex:1,overflow:"auto",padding:"24px 24px 48px"}}>
          <SectionTitle num={activeSec?.num} label={activeSec?.label} done={!!generated[section]}/>
          {spinning===section&&!generated[section] ? <Spinner label={activeSec?.label}/> :
           generated[section] ? (Renderer ? <Renderer d={generated[section]}/> : <pre style={{color:C.sand,fontSize:12}}>{JSON.stringify(generated[section],null,2)}</pre>) :
           <Empty msg={!isStudio&&!clientName?"Enter client name and brief above":"Click Generate above"}/>}
        </div>
      </main>
    </div>
  );
}

// ── MAIN APP ──────────────────────────────────────
const TOP_TABS = [
  {id:"studio",label:"MY STUDIO",group:"strategy"},
  {id:"client",label:"CLIENT BUILDER",group:"strategy"},
  {id:"dna",label:"BRAND DNA",group:"vibiz"},
  {id:"ads",label:"AD CAMPAIGNS",group:"vibiz"},
  {id:"content",label:"CONTENT STUDIO",group:"vibiz"},
  {id:"leads",label:"LEAD QUALIFIER",group:"vibiz"},
  {id:"cases",label:"CASE STUDIES",group:"ref"},
];

function Studio() {
  const [tab, setTab] = useState("studio");
  const isStudio = tab==="studio";
  const [clientName, setCN] = useState("");
  const [clientCtx, setCC] = useState("");
  const activeName = isStudio ? STUDIO_NAME : clientName;
  const activeCtx  = isStudio ? STUDIO_CTX  : clientCtx;

  return (
    <div style={{minHeight:"100vh",background:C.black,color:C.cream}}>
      <header style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"0 24px",borderBottom:"1px solid rgba(255,255,255,0.07)",background:C.black,position:"sticky",top:0,zIndex:20,flexWrap:"wrap"}}>
        <div style={{display:"flex",alignItems:"center",gap:16,padding:"12px 0"}}>
          <div style={{display:"inline-flex",flexDirection:"column",alignItems:"center"}}>
            <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:900,fontSize:22,color:C.cream,letterSpacing:"-0.02em",writingMode:"vertical-rl",transform:"rotate(180deg)",lineHeight:0.85}}>MUSED</div>
            <div style={{display:"flex",gap:6,marginTop:2,fontFamily:"'Barlow Condensed',sans-serif",fontWeight:400,fontSize:5,color:C.cream,letterSpacing:"0.2em",opacity:0.5}}><span>THE</span><span>STUDIO</span></div>
          </div>
          <div style={{width:1,height:28,background:"rgba(255,255,255,0.1)"}}/>
          <div>
            <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:8,fontWeight:700,letterSpacing:"0.22em",color:C.brown}}>BRAND STRATEGY PLATFORM</div>
            <div style={{fontFamily:"'DM Serif Display',serif",fontSize:13,color:C.sand,fontStyle:"italic"}}>Turn positioning into presence.</div>
          </div>
        </div>
        <nav style={{display:"flex",flexWrap:"wrap"}}>
          {TOP_TABS.map(t=>{
            const vibiz = t.group==="vibiz";
            const active = tab===t.id;
            return (
              <button key={t.id} onClick={()=>setTab(t.id)} style={{padding:"12px 14px",background:active?vibiz?"#4A1942":C.brown:"transparent",color:active?C.cream:vibiz?C.muted:C.muted,border:"none",fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,fontSize:9,letterSpacing:"0.16em",borderBottom:active?"none":`2px solid transparent`,transition:"all 0.15s",borderTop:active&&vibiz?"2px solid #8B2E8B":"none"}}>
                {t.label}
              </button>
            );
          })}
        </nav>
      </header>

      {(tab==="studio"||tab==="client") && <StrategyBuilder isStudio={tab==="studio"} key={tab}/>}
      {tab==="dna"     && <BrandDNATool name={activeName} ctx={activeCtx}/>}
      {tab==="ads"     && <AdCampaignsTool name={activeName} ctx={activeCtx}/>}
      {tab==="content" && <ContentStudioTool name={activeName} ctx={activeCtx}/>}
      {tab==="leads"   && <LeadQualifierTool/>}
      {tab==="cases"   && <CaseStudies/>}
    </div>
  );
}

// ── PASSWORD GATE ─────────────────────────────────
function PasswordGate({onUnlock}) {
  const [pw, setPw] = useState("");
  const [err, setErr] = useState(false);
  const [shake, setShake] = useState(false);
  const ref = useRef(null);
  useEffect(()=>{ref.current&&ref.current.focus();},[]);
  const attempt = () => {
    if (pw===PASSWORD) { onUnlock(); }
    else { setErr(true); setShake(true); setPw(""); setTimeout(()=>setShake(false),500); }
  };
  return (
    <div style={{minHeight:"100vh",background:C.black,display:"flex",alignItems:"center",justifyContent:"center",padding:24}}>
      <div style={{position:"fixed",inset:0,backgroundImage:"radial-gradient(ellipse at 30% 20%,rgba(123,92,66,0.07) 0%,transparent 60%),radial-gradient(ellipse at 70% 80%,rgba(45,74,62,0.05) 0%,transparent 60%)",pointerEvents:"none"}}/>
      <div style={{position:"relative",zIndex:1,width:"100%",maxWidth:380,textAlign:"center"}}>
        <div style={{marginBottom:48}}>
          <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:400,fontSize:10,color:C.sandD,letterSpacing:"0.55em",marginBottom:4}}>THE</div>
          <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:900,fontSize:80,color:C.cream,letterSpacing:"-0.02em",lineHeight:0.85}}>MUSED</div>
          <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:400,fontSize:10,color:C.sandD,letterSpacing:"0.55em",marginTop:6}}>STUDIO</div>
          <div style={{display:"flex",alignItems:"center",gap:16,margin:"24px auto 0",maxWidth:180}}>
            <div style={{flex:1,height:1,background:`linear-gradient(to right,transparent,${C.brown})`}}/>
            <div style={{width:4,height:4,background:C.brown,transform:"rotate(45deg)"}}/>
            <div style={{flex:1,height:1,background:`linear-gradient(to left,transparent,${C.brown})`}}/>
          </div>
          <p style={{fontFamily:"'DM Serif Display',serif",fontSize:13,fontStyle:"italic",color:C.muted,marginTop:14}}>Brand Strategy Platform</p>
        </div>
        <div style={{background:"rgba(255,255,255,0.025)",border:`1px solid ${err?"rgba(200,100,100,0.3)":"rgba(255,255,255,0.06)"}`,padding:"32px 28px",transition:"border-color 0.3s",animation:shake?"shakeX 0.4s ease":"none"}}>
          <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:9,fontWeight:700,color:C.brown,letterSpacing:"0.28em",marginBottom:16}}>ACCESS REQUIRED</div>
          <input ref={ref} type="password" value={pw} onChange={e=>{setPw(e.target.value);setErr(false);}} onKeyDown={e=>e.key==="Enter"&&attempt()} placeholder="Enter password" style={{width:"100%",padding:"13px 16px",background:"rgba(255,255,255,0.04)",border:`1px solid ${err?"rgba(200,100,100,0.5)":"rgba(255,255,255,0.1)"}`,color:C.cream,fontFamily:"'Barlow Condensed',sans-serif",fontSize:15,letterSpacing:"0.15em",textAlign:"center",marginBottom:err?8:16,transition:"border-color 0.3s"}}/>
          {err&&<div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:10,color:"#f5a0a0",letterSpacing:"0.12em",marginBottom:14}}>Incorrect password. Try again.</div>}
          <button onClick={attempt} style={{width:"100%",padding:"13px",background:C.brown,color:C.cream,border:"none",fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,fontSize:11,letterSpacing:"0.24em",cursor:"pointer"}}
            onMouseEnter={e=>e.target.style.background=C.brownD}
            onMouseLeave={e=>e.target.style.background=C.brown}>
            ENTER →
          </button>
        </div>
        <p style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:8,color:"rgba(255,255,255,0.08)",letterSpacing:"0.22em",marginTop:24}}>THE MUSED STUDIO · BRAND STRATEGY</p>
      </div>
      <style>{`@keyframes shakeX{0%,100%{transform:translateX(0)}20%{transform:translateX(-8px)}40%{transform:translateX(8px)}60%{transform:translateX(-5px)}80%{transform:translateX(5px)}}`}</style>
    </div>
  );
}

function App() {
  const [unlocked, setUnlocked] = useState(false);
  return unlocked ? <Studio/> : <PasswordGate onUnlock={()=>setUnlocked(true)}/>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
